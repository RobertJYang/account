include "/opt/bmc/libmc/config.cfg"

config:set_root("/")
config:set_start("account/service/main")
config:include_app("account")
config:done()

logger = "/var/log/framework/account.log"
logpath = "/var/log/framework"

KSF_PATH = "/data/trust/ksf/"
KSF_BAK_PATH = "/data/trust/ksf/"
-- Account预置用户使用key_mgmt生成，为了解密必须使用key_mgmt的KSF文件
HARDWARE_ROOTKEY_ENABLE = true